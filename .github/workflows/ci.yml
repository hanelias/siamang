name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy
        run: mypy siamang --ignore-missing-imports
        continue-on-error: true  # advisory for now, will enforce later

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run pytest suite
        run: pytest tests/ -v --tb=short

      - name: Test imports
        run: |
          python -c "
          import siamang as sg
          print('Version:', sg.__version__)
          assert hasattr(sg, 'Variable')
          assert hasattr(sg, 'Question')
          assert hasattr(sg, 'SingleChoice')
          assert hasattr(sg, 'MultiChoice')
          assert hasattr(sg, 'Page')
          assert hasattr(sg, 'Questionnaire')
          assert hasattr(sg, 'UIConfig')
          assert hasattr(sg, 'get_preset')
          assert hasattr(sg, 'Script')
          assert hasattr(sg, 'Expression')
          print('All exports OK')
          "

      - name: Test survey compilation
        run: |
          python -c "
          import siamang as sg
          from siamang.frontend.compiler.react import compile_react_payload

          v = sg.Variable('test', 'nominal', 'Test var', labels={1: 'A', 2: 'B'})
          q = sg.SingleChoice('Pick one', v, required=True, other_specify=True)
          p = sg.Page('p1', 'Test Page', items=[q])
          survey = sg.Questionnaire(title='CI Test', pages=[p])

          payload = compile_react_payload(survey)
          assert 'SURVEY' in payload
          assert 'PAGES' in payload
          print('Compilation OK')
          "

      - name: Test HTML rendering
        run: |
          python -c "
          import siamang as sg
          from siamang.frontend.runtime.react import ReactRuntime, RuntimeRenderContext
          from siamang.frontend.theme.ui_config import UIConfig

          v = sg.Variable('color', 'nominal', 'Fav color', labels={1: 'Red', 2: 'Blue'})
          q = sg.SingleChoice('Pick a color', v)
          p = sg.Page('p1', 'Colors', items=[q])
          survey = sg.Questionnaire(title='Render Test', pages=[p])

          schema = survey.compile()
          ui = UIConfig()
          context = RuntimeRenderContext(schema=schema, ui=ui, survey=survey)

          runtime = ReactRuntime()
          html = runtime.render_html(context)
          assert len(html) > 1000
          assert 'PAGES' in html or 'window.' in html
          print(f'Render OK: {len(html)} bytes')
          "

      - name: Test UIConfig and theming
        run: |
          python -c "
          import siamang as sg

          # Test all theme presets with their expected font_preset values
          expected = {
              'default': 'academic',
              'academic': 'academic',
              'dark': 'academic',
              'modern': 'modern',
              'humanist': 'humanist',
              'high_contrast': 'modern',
          }
          for name, expected_font in expected.items():
              preset = sg.get_preset(name)
              assert preset.font_preset == expected_font, (
                  f'{name}: expected font_preset={expected_font!r}, got {preset.font_preset!r}'
              )
              print(f'Preset {name}: font_preset={preset.font_preset} OK')

          # Test custom config
          ui = sg.UIConfig(
              font_preset='modern',
              primary_color='#e63946',
              accent_color='#457b9d',
          )
          assert ui.primary_color == '#e63946'
          assert ui.font_preset == 'modern'
          print('UIConfig OK')
          "

      - name: Test Supabase migration SQL generation
        run: |
          python -c "
          from siamang.deploy.backends.supabase import generate_migration_sql

          sql = generate_migration_sql(survey_id='test123', title=\"Student's Survey\")
          assert 'CREATE TABLE' in sql
          assert \"Student''s Survey\" in sql  # escaped apostrophe
          assert 'test123' in sql
          print(f'Migration SQL OK: {len(sql)} chars')
          "

      - name: Test script factories (injection safety)
        run: |
          python -c "
          from siamang.core.script import Script

          s1 = Script.randomize_options(\"q_test's\")
          s2 = Script.validate_fields_match('field_a', 'field_b', \"Values don't match\")
          s3 = Script.timed_question('q1', 30)
          assert 'q_test' in s1.code
          assert 'field_a' in s2.code
          assert '30' in s3.code
          print('Script factories OK')
          "

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile, os
          whl = [f for f in os.listdir('dist') if f.endswith('.whl')][0]
          with zipfile.ZipFile(f'dist/{whl}') as z:
              names = z.namelist()
              assert any('bundle.js' in n for n in names), 'bundle.js missing from wheel'
              assert any('style.css' in n for n in names), 'style.css missing from wheel'
              assert any('index.html' in n for n in names), 'index.html template missing'
              print(f'Wheel OK: {len(names)} files')
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
          retention-days: 7
